[General]
bEnableMod = true                ; Master enable toggle. Disables all mod functionality when false
fGrabRange = 80.0                ; Max distance (game units) from player to initiate grab via G-key
bGrabAnyone = false              ; Allow grabbing any NPC (overrides followers/children/hostile settings)
bGrabFollowers = true            ; Allow grabbing player teammates
bGrabChildren = false            ; Allow grabbing child actors
bGrabHostile = true              ; Allow grabbing actors hostile to the player
fStaminaDrainRate = 5.0          ; Stamina drain per second while dragging (STUB - not yet wired)
fDragSpeedMult = 0.5             ; Player speed multiplier while dragging (1.0 = no change)
bNoSpeedPenalty = false          ; Prevent the engine's default drag speed penalty
iActionKey = 34                  ; Action key scancode (34=G, 19=R). Used for release/drop/throw
bUseShoutKeyForRelease = false   ; Use Shout key for release instead of action key
bDropOnPlayerHit = true          ; Auto-drop NPC if player takes damage while dragging
bNoSprintWhileDragging = false   ; Drain stamina to 0 while dragging, preventing sprint
fSpringDamping = 1.5             ; Havok mouse spring damping (higher = more sluggish)
fSpringElasticity = 0.05         ; Havok mouse spring stiffness (higher = snappier but can jitter)
fSpringMaxForce = 1000.0         ; Max force the spring can exert (lower = NPC lags behind camera)
fDragMaxVelocity = 5.0           ; Max velocity for ragdoll bodies during drag (prevents flings). Spring body excluded.
fGrabTetherDist = 600.0          ; Auto-drop if NPC exceeds this distance from player (safety net)

[Throw]
fThrowImpulseMax = 20.0          ; Max throw force when fully charged
fThrowDropWindow = 0.2           ; Seconds before charge starts (tap action key = drop, hold = charge)
fThrowTimeToMax = 3.0            ; Seconds from charge start to reach max throw force

[Impact]
fImpactRadius = 120              ; Proximity radius (game units, 2D) for impact knockback detection
fImpactDuration = 3.0            ; Max seconds to track thrown NPC for impacts
fImpactMinVelocity = 0.5         ; Stop tracking when thrown NPC speed drops below this (Havok units)
fImpactForce = 300.0             ; Havok impulse magnitude on ragdoll targets hit by thrown NPC
fImpactPushForceMax = 5.0        ; Reserved - PushActorAway force for standing targets (hardcoded in Papyrus)
fImpactDamage = 0.0              ; Base damage dealt on impact (0 = disabled). Scales with speed.
fImpactDamageThrownMult = 1.0    ; Damage multiplier for thrown NPC self-damage on impact
bImpactOnDrop = false            ; Enable impact tracking on drops (not just throws)
fSwingImpactRadiusMult = 0.6     ; Swing impact radius = fImpactRadius * this value
fSwingImpactCooldown = 0.5       ; Seconds between swing hits on same target
bSwingImpactStatics = true       ; Push dynamic static objects (baskets, clutter) during swing
fRagdollMaxVelocity = 5.0        ; Max velocity for impact impulse clamping (prevents launch into orbit)
fImpactForceSpeedScale = 1.0     ; Impact force scales by speed * this (higher = speed matters more)
fImpactDamageSpeedScale = 1.0    ; Damage scales by (1.0 + speed * this) (higher = speed matters more)
